<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For RINKA ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top, #ffb6d5 0%, transparent 35%),
    radial-gradient(circle at bottom right, #ff6fa5 0%, transparent 40%),
    linear-gradient(135deg,#2b1055,#7597de);
}

.card{
    text-align:center;
    color:white;
    padding:50px;
    border-radius:30px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:
        0 0 25px rgba(255,20,147,.6),
        0 0 60px rgba(255,105,180,.3);
    animation:zoom 1.8s ease;
    z-index:2;
}

h1{
    font-size:60px;
    margin-bottom:20px;
    text-shadow:0 0 15px hotpink;
}

p{
    font-size:30px;
    line-height:1.6;
    text-shadow:0 0 8px rgba(255,255,255,.5);
}

.heart{
    position:absolute;
    color:#ff4d88;
    text-shadow:
        0 0 10px #ff4d88,
        0 0 20px #ff4d88,
        0 0 35px #ff99cc;
    animation:float linear infinite;
    user-select:none;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-120px) scale(1.6);
        opacity:0;
    }
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>Hey RINKA 😘</h1>
    <p>I love you every step of the way 💕!</p>
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*40)+"px";
    heart.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },8000);
}

setInterval(createHeart,180);
</script>

</body>
</html>
